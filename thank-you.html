<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Message Sent - SpiderScope</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0A1128 0%, #0F1A3A 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .thankyou-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid #00B4D8;
            padding: 50px 40px;
            text-align: center;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            animation: fadeInUp 0.6s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .thankyou-card i {
            font-size: 70px;
            color: #00B4D8;
            margin-bottom: 20px;
        }

        .thankyou-card h1 {
            color: #00B4D8;
            font-size: 32px;
            margin-bottom: 15px;
        }

        .thankyou-card p {
            color: #CBD5E1;
            font-size: 16px;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .home-btn {
            display: inline-block;
            background: #00B4D8;
            color: #0A1128;
            padding: 12px 30px;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            font-size: 16px;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
        }

        .home-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 20px rgba(0, 180, 216, 0.4);
            background: #00c8f0;
        }
    </style>
</head>
<body>
    <div class="thankyou-card">
        <i class="fas fa-check-circle"></i>
        <h1>Thank You!</h1>
        <p>Your message has been sent successfully.<br>Our team will get back to you within 24 hours.</p>
        <a href="index.html" class="home-btn">
            <i class="fas fa-home"></i> Back to Home
        </a>
    </div>

    <!-- Font Awesome for icons -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
</body>
</html>
