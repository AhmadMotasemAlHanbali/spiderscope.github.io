<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Message Sent - SpiderScope</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0A1128 0%, #0F1A3A 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            padding: 50px;
            border-radius: 20px;
            border: 1px solid #00B4D8;
            text-align: center;
            max-width: 500px;
            margin: 20px;
            animation: fadeIn 0.5s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .card i {
            font-size: 70px;
            color: #00B4D8;
            margin-bottom: 20px;
        }
        .card h1 {
            font-size: 32px;
            margin-bottom: 15px;
            color: #00B4D8;
        }
        .card p {
            color: #94A3B8;
            margin-bottom: 30px;
            line-height: 1.6;
        }
        .btn {
            background: #00B4D8;
            color: #0A1128;
            padding: 12px 30px;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 600;
            transition: 0.3s;
            display: inline-block;
        }
        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 20px rgba(0,180,216,0.3);
        }
    </style>
</head>
<body>
    <div class="card">
        <i class="fas fa-check-circle"></i>
        <h1>Message Sent Successfully!</h1>
        <p>Thank you for contacting SpiderScope. Our team of IoT engineers will respond to you within 24 hours.</p>
        <a href="index.html" class="btn">Back to Home</a>
    </div>
</body>
</html>
